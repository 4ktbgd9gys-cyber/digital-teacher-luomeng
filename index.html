    font-size: 15px;
    display: flex; align-items: center; justify-content: center;

    overflow: hidden;
    gap: 0;
  }

  { q: '胰腺炎|急性胰腺炎|慢性胰腺炎', a: '胰腺炎分为急性和慢性。急性胰腺炎多因胆结石或饮酒诱发，表现为剧烈上腹痛、恶心呕吐，需及时就医，禁食禁水、静脉补液治疗。慢性胰腺炎则表现为反复上腹痛、血糖升高、脂肪泻等，与长期饮酒、胰腺导管阻塞有关。罗蒙教授在胰腺外科有丰富经验，建议有相关症状者及时就诊。' },
  { q: '胰腺癌|胰头癌', a: '胰腺癌是恶性程度较高的消化道肿瘤，早期症状隐匿，常见表现有上腹痛、黄疸、体重下降、腰背痛等。由于位置深，早期诊断较困难，高危人群（有家族史、慢性胰腺炎者）建议定期检查（CA19-9肿瘤标志物、腹部CT/MRI）。治疗以手术为主，罗蒙教授在胰十二指肠切除术等高难度手术方面有丰富经验。' },
  { q: '肝癌|肝血管瘤|肝囊肿', a: '肝脏常见疾病包括：肝血管瘤（多为良性，小于5cm且无症状者可观察）、肝囊肿（先天性，大的囊肿可穿刺抽液或手术）、原发性肝癌（与乙肝/肝硬化相关，需早诊早治）。罗蒙教授在肝切除术方面有丰富经验，能独立完成左右半肝切除术。' },
  { q: '门静脉高压症|肝硬化腹水|静脉曲张', a: '门静脉高压症多因肝硬化引起，表现为脾肿大、腹水、食管胃底静脉曲张（可致大出血）、肝功能异常等。罗蒙教授在门静脉高压症的诊治上有较高造诣，能独立完成门高压断流手术+脾肾分流术。治疗原则：降低门静脉压力、预防曲张静脉破裂出血、处理腹水，需长期综合管理。' },
  { q: '胃癌|胃肠道肿瘤', a: '胃癌早期症状不典型，可表现为上腹隐痛、食欲下降、体重减轻、黑便等。胃肠道肿瘤的诊治强调早发现、早诊断、早治疗。40岁以上、有胃癌家族史或长期胃部不适者建议定期行胃镜检查。罗蒙教授在胃癌根治术等胃肠道手术方面有丰富经验。' },
  { q: '疝气|腹股沟疝|切口疝', a: '疝气是普外科常见病，指腹腔内容物（多为小肠）从腹壁薄弱处突出。表现为站立或用力时腹股沟区或切口处肿物突出，躺下可回纳。手术修补是唯一根治方法，目前以腹腔镜疝修补术为主，创伤小、恢复快。罗蒙教授可为您评估手术方案。' },
  { q: '甲状腺结节|甲状腺癌', a: '甲状腺结节很常见，大多数为良性。评估重点是结节大小、超声特征（TI-RADS分类）及甲状腺功能。TI-RADS 4类以上建议穿刺活检。甲状腺癌中乳头状癌最常见，预后相对较好，手术切除效果确切。有甲状腺结节建议定期复查甲功和甲状腺超声。' },
  { q: '阑尾炎|阑尾手术|微创阑尾', a: '阑尾炎表现为转移性右下腹痛（先上腹后右下）、发热、恶心等，确诊后通常需手术切除（阑尾切除术）。目前多采用腹腔镜微创手术，创伤小、恢复快、疤痕小。延误治疗可能发展为阑尾穿孔、腹膜炎，危险！如有右下腹痛请及时就医。' },

  // ─── 就医指南 ───
  { q: '怎么预约罗蒙教授|罗蒙教授门诊时间|如何挂号', a: '罗蒙教授目前担任上海市卫健委领导职务，门诊主要在上海交通大学医学院附属第九人民医院普外科。如需面诊，建议通过第九人民医院官方渠道预约挂号（微信服务号、官方网站或电话预约），或通过正规医疗平台咨询。' },
  { q: '健康体检|体检发现异常|要不要紧', a: '体检发现异常不必过度紧张，许多指标轻度异常可能与饮食、作息有关，建议定期复查并请医生综合评估。如有肝胆胰相关异常指标，建议到普外科进一步咨询，必要时行影像学检查（超声、CT、MRI）明确诊断。罗蒙教授团队可提供专业评估建议。' },
  { q: '术后注意事项|手术后恢复|术后饮食', a: '术后恢复因手术类型而异，一般原则：早期下床活动促进肠功能恢复；饮食从流质逐步过渡到正常，避免油腻辛辣；伤口保持干燥清洁；按时复查。腹腔镜手术后通常住院2-3天，2周内避免剧烈活动。具体请遵手术团队医嘱。' },

  // ─── 其他 ───
  { q: '门静脉高压怎么治|静脉曲张破裂出血', a: '门静脉高压症治疗包括：1. 药物降低门静脉压力（普萘洛尔等）；2. 内镜下曲张静脉套扎或硬化剂注射（预防出血）；3. 介入治疗（TIPS）；4. 外科手术（断流术、分流术）。罗蒙教授在门静脉高压症的外科治疗方面有丰富经验。如有急性大出血，请立即就近急诊！' },
  { q: '胰十二指肠切除术|惠普手术', a: '胰十二指肠切除术（Whipple术）是普外科高难度手术，主要用于胰头癌、胆总管下段癌、壶腹周围癌等。手术切除范围包括胰头、十二指肠、空肠上段、胆囊和胆总管，消化道需重建（胰肠吻合、胆肠吻合、胃肠吻合）。罗蒙教授能独立完成此类手术，经验丰富。' },
];
if (!localStorage.getItem('teacherKB')) localStorage.setItem('teacherKB', JSON.stringify(defaultKB));

// ========== 问答匹配 ==========
function findAnswer(query) {
  var kb = getKB();
  query = query.toLowerCase().trim();
  var best = { score: 0, answer: '' };
  for (var i = 0; i < kb.length; i++) {
    var q = kb[i].q.toLowerCase();
    var keywords = q.split('|');
    var score = 0;
    for (var k = 0; k < keywords.length; k++) {
      var kw = keywords[k].trim();
      if (kw && query.indexOf(kw) !== -1) score++;
    }
    if (score > best.score) { best.score = score; best.answer = kb[i].a; }
  }
  if (best.score > 0) return best.answer;
  var fallback = [
    '感谢提问！关于"' + query.slice(0, 15) + '"这个问题，建议您到医院普外科门诊进一步咨询，以获得专业的医学评估。罗蒙教授团队随时为您提供帮助。',
    '这是一个比较具体的健康问题，建议您描述更多症状，或直接预约罗蒙教授门诊进行面诊，以获得准确的诊断和治疗建议。',
    '您的这个问题需要结合具体情况进行专业评估。建议通过正规渠道预约罗蒙教授的门诊，进行详细问诊和必要检查，以获得个体化的诊疗方案。',
  ];
  return fallback[Math.floor(Math.random() * fallback.length)];
}

// ========== 语音朗读 ==========
var voiceEnabled = true;
var currentUtterance = null;

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  var btn = document.getElementById('voiceToggleBtn');
  var topBtn = document.getElementById('voiceTopBtn');
  var icon = document.getElementById('voiceIcon');
  var label = document.getElementById('voiceLabel');
  if (voiceEnabled) {
    btn.classList.add('on'); topBtn.style.color = 'var(--primary)';
    icon.textContent = '🔊'; label.textContent = '语音朗读：开启';
  } else {
    btn.classList.remove('on'); topBtn.style.color = 'var(--muted)';
    icon.textContent = '🔇'; label.textContent = '语音朗读：关闭';
  }
}

function speak(text, btnEl) {
  if (!voiceEnabled) return;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  var clean = text.replace(/[😊😄👋📚🔊🔇📤📱🔗💡✨👩‍🏫👤➤⚙🏥🎓🏆📖]/g, '').replace(/\*+/g, '').trim();
  var utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'zh-CN';
  utter.rate = 0.92;
  utter.pitch = 0.90;

  var voices = window.speechSynthesis.getVoices();
  var maleKeywords = ['Yunxi','Yunyang','Kangkang','Yunfeng','Yunxia'];
  var zhVoice = null;
  outer: for (var ki = 0; ki < maleKeywords.length; ki++) {
    for (var vi = 0; vi < voices.length; vi++) {
      if (voices[vi].lang.indexOf('zh') === 0 && voices[vi].name.indexOf(maleKeywords[ki]) !== -1) {
        zhVoice = voices[vi]; break outer;
      }
    }
  }
  if (!zhVoice) {
    for (var vj = 0; vj < voices.length; vj++) {
      if (voices[vj].lang === 'zh-CN') { zhVoice = voices[vj]; break; }
    }
  }
  if (!zhVoice) {
    for (var vk = 0; vk < voices.length; vk++) {
      if (voices[vk].lang.indexOf('zh') === 0) { zhVoice = voices[vk]; break; }
    }
  }
  if (zhVoice) utter.voice = zhVoice;

  utter.onend = function() {
    if (btnEl) btnEl.textContent = '🔊 朗读';
  };
  if (btnEl) btnEl.textContent = '⏹ 停止';
  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

// ========== 对话功能 ==========
function getTime() { return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}); }

function addMessage(type, text, autoSpeak) {
  var container = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  var avatarIcon = type === 'bot' ? '🩺' : '👤';
  div.innerHTML =
    '<div class="msg-avatar">' + avatarIcon + '</div>' +
    '<div>' +
      '<div class="msg-bubble">' + text.replace(/\n/g, '<br>') + (type === 'bot' ? '<button class="speak-btn" onclick="speak(\'' + text.replace(/'/g, '\\\'').replace(/\n/g, ' ') + '\', this)">🔊 朗读</button>' : '') + '</div>' +
      '<div class="msg-time">' + getTime() + '</div>' +
    '</div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text) return;
  addMessage('user', text, false);
  input.value = '';
  input.style.height = 'auto';
  showTyping();

  // 添加用户消息到对话历史
  conversationHistory.push({ role: 'user', content: text });

  // 通过 Cloudflare Worker 调用大模型（API Key 不暴露在前端）
  fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'z-ai/glm-4.5-air:free',
      messages: [{ role: 'system', content: SYSTEM_PROMPT }].concat(conversationHistory),
      max_tokens: 600,
      temperature: 0.75
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    removeTyping();
    var answer;
    if (data.choices && data.choices[0] && data.choices[0].message) {
      answer = data.choices[0].message.content.trim();
      conversationHistory.push({ role: 'assistant', content: answer });
      addMessage('bot', answer, true);
    } else if (data.error) {
      // 大模型不可用，降级到知识库
      console.warn('大模型调用失败:', data.error.message);
      var kbAnswer = findAnswer(text);
      addMessage('bot', kbAnswer, true);
    } else {
      var kbAnswer = findAnswer(text);
      addMessage('bot', kbAnswer, true);
    }
  })
  .catch(function(err) {
    removeTyping();
    console.warn('Worker 调用失败:', err.message);
    var kbAnswer = findAnswer(text);
    addMessage('bot', kbAnswer, true);
  });
}

function showTyping() {
  var container = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingMsg';
  div.innerHTML =
    '<div class="msg-avatar">🩺</div>' +
    '<div><div class="msg-bubble"><div class="typing-dot"><span></span><span></span><span></span></div></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function removeTyping() {
  var t = document.getElementById('typingMsg');
  if (t) t.parentNode.removeChild(t);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
  conversationHistory = []; // 清空大模型对话历史
  showToast('对话已清空');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ========== 分享二维码 ==========
function showQR() {
  var url = window.location.href;
  var canvas = document.getElementById('qrCanvas');
  canvas.width = 200; canvas.height = 200;
  new QRCode(canvas, { text: url, width: 200, height: 200, colorDark: '#1A2B3C', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  document.getElementById('shareUrl').textContent = url;
  document.getElementById('qrModal').classList.add('show');
}
function closeQR(e) { if (e.target === e.currentTarget) closeQRDirect(); }
function closeQRDirect() { document.getElementById('qrModal').classList.remove('show'); }
